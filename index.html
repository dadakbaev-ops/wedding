<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу — Нурдин & Чолпон-Ай</title>
    
    <!-- Подключение премиальных шрифтов -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
   <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            font-family: 'Cormorant Garamond', serif;
            -webkit-font-smoothing: antialiased;
            background-color: #f4f4f2;
        }

        /* Полноэкранный фоновый контейнер */
        .main-bg {
            background-image: url('https://i.pinimg.com/736x/cf/d4/63/cfd46360bef1551aea869acebf33bcb7.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
            position: relative;
        }

        /* Элегантная матовая подложка для читаемости текста поверх фото */
        .main-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.75); /* Мягкий полупрозрачный белый вуаль */
            z-index: 1;
        }

        /* Карточка с контентом */
        .invitation-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(4px); /* Эффект матового стекла */
            -webkit-backdrop-filter: blur(4px);
            border-radius: 2px;
        }

        .top-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #555;
            margin-bottom: 25px;
            font-weight: 400;
        }

        /* Стилизация имен (каллиграфия + строгость) */
        .names-wrapper {
            margin-bottom: 25px;
        }

       .name-calligraphy {
            font-family: 'Snell Roundhand', 'Bickham Script Pro', 'Gabriola', 'Cormorant Garamond', cursive;
            font-size: 58px;
            line-height: 0.9;
            color: #111;
            font-weight: 300;
            letter-spacing: 0px;
        }
        }
        }

        .ampersand {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 24px;
            color: #666;
            margin: 8px 0;
        }

        .main-text {
            font-size: 17px;
            line-height: 1.6;
            color: #2c2c2c;
            margin-bottom: 30px;
            font-style: italic;
            font-weight: 400;
        }

        /* Разделительные линии для даты из референса */
        .date-container {
            border-top: 1px solid #9c968f;
            border-bottom: 1px solid #9c968f;
            padding: 16px 0;
            margin: 30px 0;
        }

        .date-number {
            font-size: 30px;
            text-transform: uppercase;
            letter-spacing: 6px;
            font-weight: 400;
            color: #111;
        }

        .time-number {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #444;
            margin-top: 6px;
            font-weight: 500;
        }

        /* Информационный блок локации */
        .venue-container {
            margin-top: 25px;
        }

        .venue-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 8px;
        }

        .venue-title {
            font-size: 23px;
            font-weight: 500;
            color: #111;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }

        .venue-address {
            font-size: 15px;
            color: #444;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        /* Кнопка навигации 2ГИС */
        .gis-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: none;
            border: 1px solid #2c2c2c;
            padding: 12px 26px;
            color: #111;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 0px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .gis-button:hover {
            background-color: #111;
            color: #fff;
        }

        .gis-button svg {
            width: 14px;
            height: 14px;
            margin-right: 8px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="main-bg">
        <div class="invitation-container">
            
            <div class="top-label">Приглашение</div>
            
            <!-- Блок имен -->
            <div class="names-wrapper">
                <div class="name-calligraphy">Нурдин</div>
                <div class="ampersand">&</div>
                <div class="name-calligraphy">Чолпон-Ай</div>
            </div>

            <p class="main-text">
                Дорогие родные и друзья!<br>
                Приглашаем вас разделить с нами особенный день — день нашей свадьбы.
            </p>

            <!-- Геометрия даты по референсу -->
            <div class="date-container">
                <div class="date-number">13.08.2026</div>
                <div class="time-number">Четверг • 17:00</div>
            </div>

            <!-- Локация -->
            <div class="venue-container">
                <div class="venue-label">Место проведения</div>
                <div class="venue-title">Банкетный зал "Улуу Тоо"</div>
                <div class="venue-address">г. Бишкек, ул. Сухэ-Батора, 15/1</div>
                
                <!-- Кнопка 2GIS -->
                <a href="https://2gis.kg/bishkek/search/%D0%A3%D0%BB%D1%83%D1%83%20%D0%A2%D0%BE%D0%BE%20%D0%A1%D1%83%D1%85%D1%8D-%D0%91%D0%B0%D1%82%D0%BE%D1%80%D0%B0%2015%2F1" target="_blank" class="gis-button">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                    </svg>
                    Открыть в 2GIS
                </a>
            </div>

        </div>
    </div>

</body>
</html>
